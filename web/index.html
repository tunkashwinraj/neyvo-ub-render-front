<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">
  <meta name="theme-color" content="#005cb9" id="meta-theme-color">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Neyvo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon_goodwin.png" id="favicon-link"/>
  <script>
    (function() {
      var host = (window.location.hostname || '').toLowerCase();
      if (host.indexOf('goodwin') !== -1) {
        var link = document.getElementById('favicon-link');
        if (link) { link.href = 'favicon_goodwin.png'; link.type = 'image/png'; }
        var meta = document.getElementById('meta-theme-color');
        if (meta) meta.content = '#003366';
      }
    })();
  </script>

  <title>Neyvo</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      z-index: 9999;
    }

    .loader-dots {
      display: flex;
      gap: 10px;
    }

    .loader-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #005cb9;
      animation: loaderPulse 0.9s ease-in-out infinite;
    }

    .loader-dot:nth-child(2) { animation-delay: 0.15s; }
    .loader-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes loaderPulse {
      0%, 100% { opacity: 0.45; transform: scale(0.7); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="app-loader" aria-label="Loading Neyvo">
    <div class="loader-dots">
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
      <div class="loader-dot"></div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('app-loader');
      if (loader) loader.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
